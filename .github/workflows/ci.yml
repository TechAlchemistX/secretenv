name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --workspace -- --deny warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # NOTE: `--all-features` is deliberately NOT used.
      # `secretenv-core::value-access` (v0.15 polarity flip from v0.14's
      # subtractive `mcp-safe`) is enabled by the workspace `[workspace.
      # dependencies]` so every workspace consumer gets the value-
      # producing surface by default; passing `--all-features` would
      # add no new behaviour but would unnecessarily enable any
      # future per-crate optional features. The `value-access`
      # trybuild harness has its own job below — it runs on the SAFE
      # surface (default-features = false) to prove the value APIs
      # are unreachable there.
      - run: cargo test --workspace

  value-access-trybuild:
    name: value-access trybuild (compile-fail on SAFE surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # v0.15 BREAKING (arch-H2): feature polarity flipped. The
      # trybuild harness now runs WITHOUT `value-access` (the SAFE
      # default surface) and proves the value-producing APIs do not
      # compile. `--no-default-features` is required because the
      # workspace-level dep includes `features = ["value-access"]`.
      - run: cargo test -p secretenv-core --no-default-features --test value_access_trybuild

  tracing-leak-guard:
    name: SEC-INV-17 tracing-leak guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # ripgrep was preinstalled on the older ubuntu-latest image but
      # was removed sometime before 2026-05; install it explicitly so
      # the script's `command -v rg` guard stops bailing.
      - name: install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep
      - name: SEC-INV-17 grep (tracing macro value leaks)
        run: bash scripts/check_tracing_leaks.sh

  secret-no-leak-grep:
    name: Secret<T> no-leak grep gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: grep for forbidden Secret-leaking patterns
        # Per Phase 7 security audit H2 — the previous `grep -E` with a
        # literal `\n` was structurally broken (grep is line-oriented).
        # Switched to `ripgrep --multiline` (preinstalled on ubuntu-latest
        # runners) for true cross-line matching, and broadened coverage
        # to include hand-written impls (Display / Serialize / Hash /
        # PartialEq / Clone / From) and the `from_lossy`/`expose`-style
        # workaround attempts.
        run: |
          set -euo pipefail
          fail=0
          # 1. Hand-written impls of forbidden traits for Secret<T>.
          #    Matches both single-line and `impl<T>\n    Trait for Secret`
          #    forms.
          if rg --multiline --type=rust 'impl(?:\s*<[^>]+>)?\s+(?:std::fmt::|fmt::)?(?:Display|Serialize|Deserialize|Hash|PartialEq|Eq|Clone)\s+for\s+Secret\b' crates/; then
            echo "FAIL: forbidden hand-written impl on Secret."; fail=1
          fi
          # 2. derive(...) on the Secret struct itself with any forbidden
          #    trait. The `pub struct Secret<` line is on the next line;
          #    `--multiline -U` lets the regex cross newlines.
          if rg --multiline -U --type=rust '#\[derive\([^)]*\b(?:Clone|Serialize|Deserialize|Display|Hash|PartialEq|Eq)\b[^)]*\)\]\s*\n\s*pub\s+struct\s+Secret\b' crates/; then
            echo "FAIL: forbidden derive on Secret."; fail=1
          fi
          # 3. From<Secret<...>> for String — the `Into<String>` escape.
          if rg --multiline --type=rust 'impl(?:\s*<[^>]+>)?\s+From\s*<\s*Secret\s*<' crates/; then
            echo "FAIL: From<Secret<...>> conversion would create an Into<String> escape."; fail=1
          fi
          exit $fail

  smoke-local:
    name: smoke harness (--local-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build release binary
        run: cargo build --release --bin secretenv
      - name: run --local-only smoke (no cloud creds required)
        run: bash scripts/smoke-test/run-tests.sh --local-only

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
