name: Release

# Fires on semver tags like v0.1.0, v1.2.3-rc1, etc. The tag itself is
# the release trigger — no manual workflow_dispatch for v0.1 (avoids
# accidental double-publishes). Add one later if we need patch releases
# from non-main branches.
on:
  push:
    tags:
      - 'v*.*.*'
  # `workflow_dispatch` lets the operator manually re-trigger ONLY the
  # crates.io publish job against a previously-pushed tag — recovers
  # from a half-shipped release where binary builds + GH Release +
  # Homebrew bump all succeeded but a crates.io step failed (e.g. a
  # dep-order bug introduced by a new inter-crate edge in this cycle).
  # The build/release/homebrew jobs are gated to `github.event_name ==
  # 'push'` below so they don't re-run; the publish-crates job runs in
  # both modes and reads the tag from the input.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to re-publish to crates.io (e.g. v0.17.0). The publish-crates job runs against this tag; binary build + GH Release + Homebrew steps are skipped.'
        required: true

permissions:
  contents: write      # create GitHub Release + upload artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # 1. Cross-compile the binary for every target in the matrix,
  #    strip, tar+gz with README + LICENSE, upload artifact.
  # ------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    # Binary builds only run on tag push; the workflow_dispatch path is
    # a publish-crates-only recovery for half-shipped releases.
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use-cross: false    # native arm64 runner (free for public repos) — was `cross` Docker emulation
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The repo pins the build toolchain via rust-toolchain.toml
      # (channel = "1.95.0", added in the v0.14.x hygiene cycle).
      # `dtolnay/rust-toolchain@stable` installs the `targets:` input
      # onto the `stable` toolchain — NOT the pinned one — so a
      # non-native cross target (e.g. x86_64-apple-darwin built on an
      # Apple-Silicon runner) is missing from the toolchain `cargo
      # build` actually uses. Add the target explicitly to the pinned
      # toolchain. `rustup target add` reads rust-toolchain.toml (present
      # after checkout) and applies to 1.95.0. No-op for native targets;
      # skipped for the cross-tool entry (`cross` manages its own).
      - name: Add target to the pinned toolchain
        if: ${{ !matrix.use-cross }}
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (Linux arm64 only)
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p secretenv
          else
            cargo build --release --locked --target ${{ matrix.target }} -p secretenv
          fi

      - name: Strip symbols
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/secretenv || true

      - name: Strip symbols (macOS)
        if: runner.os == 'macOS'
        run: strip -x target/${{ matrix.target }}/release/secretenv || true

      # FINDING-5 (v0.16 Phase 8b + Phase 9 audit): the released
      # macOS binary needs an ad-hoc signature before being archived,
      # otherwise the kernel SIGKILLs it on first execute on the
      # operator's machine (post-`brew install` or post-`cp` from a
      # release tarball). Without this step every Homebrew + manual
      # tarball install on macOS would hit a SIGKILL surprise on the
      # first `secretenv --version` invocation. The ad-hoc signature
      # is sufficient for Gatekeeper's local-developer policy + does
      # not require an Apple Developer ID (full notarization is a
      # post-v0.16 release-engineering upgrade per Phase 9 carry-
      # forward).
      - name: Ad-hoc codesign (macOS — FINDING-5)
        if: runner.os == 'macOS'
        run: |
          codesign --remove-signature target/${{ matrix.target }}/release/secretenv 2>/dev/null || true
          codesign --sign - target/${{ matrix.target }}/release/secretenv
          codesign --verify --verbose target/${{ matrix.target }}/release/secretenv

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          # Strict-mode so a silent `mkdir`/`cp` failure (permissions,
          # disk full, missing source binary) fails the step rather
          # than shipping a half-populated tarball. Phase-9 deploy
          # audit found this was needed at v0.11.0; landed in the
          # release-prep delta so v0.11+ tags can never publish a
          # corrupted artifact through this step.
          mkdir -p dist
          cp target/${{ matrix.target }}/release/secretenv dist/
          cp README.md LICENSE dist/
          tarball="secretenv-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$tarball" secretenv README.md LICENSE
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$tarball" > "$tarball.sha256"
          else
            shasum -a 256 "$tarball" > "$tarball.sha256"
          fi
          ls -l "$tarball" "$tarball.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: secretenv-${{ matrix.target }}
          path: |
            secretenv-*.tar.gz
            secretenv-*.tar.gz.sha256
          if-no-files-found: error

  # ------------------------------------------------------------------
  # 2. Consolidate every per-target artifact into one GitHub Release
  #    with a unified `checksums.txt`.
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    # Tag-push only — workflow_dispatch is a publish-crates recovery
    # path and the GitHub Release already exists in that scenario.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Consolidate artifacts + regenerate checksums.txt
        shell: bash
        run: |
          mkdir -p release
          find artifacts -name 'secretenv-*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
          body: |
            ## secretenv ${{ github.ref_name }}

            Install via any of:

            ```sh
            # Shell installer (universal)
            curl -sfSL https://secretenv.io/install.sh | sh

            # Homebrew
            brew install TechAlchemistX/secretenv/secretenv

            # Cargo
            cargo install secretenv
            ```

            Verify a downloaded tarball with the `checksums.txt` asset.

            See the [CHANGELOG](https://github.com/TechAlchemistX/secretenv/blob/${{ github.ref_name }}/CHANGELOG.md) for the full list of changes in this release.

  # ------------------------------------------------------------------
  # 3. Publish every crate to crates.io via a single workspace publish.
  #    cargo derives the dependency order itself and waits on the index
  #    between crates, so there is no hand-maintained order or sleeps.
  # ------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    # On tag push: wait for the GH Release job (binaries first; gives
    # ops a chance to abort before crates.io publishes are permanent).
    # On workflow_dispatch: run standalone against the operator-supplied
    # tag input. `always()` lets this job run even when `release` is
    # skipped (workflow_dispatch path).
    needs: release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      # On workflow_dispatch the operator names the tag to (re-)publish
      # against; on tag push `github.ref` already points at the tag.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # ---------------------------------------------------------------
      # Single workspace publish. cargo (>=1.66, repo is pinned 1.95.0)
      # waits for each just-published crate to be live on the index
      # before moving on, and `--workspace` derives the topological
      # publish order from the dep graph itself — so we no longer
      # hand-maintain the ordered list of 23 `cargo publish -p ...`
      # steps nor the inter-step `sleep`s (formerly ~300s of pure
      # waiting). This also removes the recurring "forgot to add the new
      # crate to release.yml in dep order" incident class (v0.15 missed
      # migrate; v0.16 missed backends-init + mcp; v0.17 swapped
      # telemetry/core) — adding a workspace member now needs zero
      # release.yml change.
      #
      # secretenv-testing has `publish = false`, so `--workspace` skips
      # it automatically.
      #
      # Verify builds are intentionally KEPT (no `--no-verify`): CI
      # already builds/tests the tagged commit, but the per-crate verify
      # also catches packaging-only bugs (a file missing from the
      # published tarball) that a normal build won't. Workspace mode
      # shares the build across crates, so this is far cheaper than the
      # 23 isolated temp-dir verify builds the old form did.
      #
      # On `workflow_dispatch` (half-shipped-release recovery) some
      # crates are already live at this version. Native
      # `cargo publish --workspace` does NOT skip already-published
      # crates (rust-lang/cargo#15006, #16139) — it errors on the first
      # one and never reaches the missing *later* crates, which is
      # exactly the tail that a half-shipped release left behind. So the
      # recovery branch first asks crates.io which member versions are
      # already live and `--exclude`s them; cargo then publishes only
      # the remaining members, still in dependency order and still
      # waiting on the index between each.
      - name: Publish all workspace crates to crates.io
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            cargo publish --workspace --locked
            exit 0
          fi

          echo "Recovery mode (workflow_dispatch): computing already-published crates to skip."
          # crates.io requires a descriptive User-Agent or it 403s.
          ua="secretenv-release-ci (https://github.com/${GITHUB_REPOSITORY})"
          excludes=()
          # `cargo metadata --no-deps` lists only workspace members.
          # `.publish == []` marks `publish = false` (secretenv-testing);
          # null or a registry list means it is publishable.
          while read -r name version; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -A "$ua" \
              "https://crates.io/api/v1/crates/${name}/${version}")
            if [ "$code" = "200" ]; then
              echo "  already live: ${name} ${version} — excluding"
              excludes+=(--exclude "$name")
            else
              echo "  missing: ${name} ${version} (http ${code}) — will publish"
            fi
          done < <(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish != []) | "\(.name) \(.version)"')

          cargo publish --workspace "${excludes[@]}" --locked

  # ------------------------------------------------------------------
  # 4. Render + push the Homebrew formula to the tap repo.
  # ------------------------------------------------------------------
  homebrew:
    name: Update Homebrew formula
    # Tag-push only. The Homebrew tap formula was bumped during the
    # original tag-push run; re-triggering via workflow_dispatch would
    # push a redundant no-op formula commit.
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: TechAlchemistX/homebrew-secretenv
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Download checksums from the just-created release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          # Small retry in case the Release assets aren't yet visible via
          # the browser-download URL (cache propagation is fast but not
          # instantaneous).
          for attempt in 1 2 3 4 5; do
            if curl -sfSL -o checksums.txt "${BASE}/checksums.txt"; then
              break
            fi
            echo "checksums.txt not yet available, retrying in 5s..."
            sleep 5
          done
          test -s checksums.txt || { echo "failed to fetch checksums.txt" >&2; exit 1; }
          cat checksums.txt

      - name: Render formula
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VER="${VERSION#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"

          extract() {
            awk -v f="$1" '$2==f {print $1; exit}' checksums.txt
          }
          SHA_MAC_ARM=$(extract "secretenv-${VERSION}-aarch64-apple-darwin.tar.gz")
          SHA_MAC_X86=$(extract "secretenv-${VERSION}-x86_64-apple-darwin.tar.gz")
          SHA_LIN_ARM=$(extract "secretenv-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")
          SHA_LIN_X86=$(extract "secretenv-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")

          for sha in "$SHA_MAC_ARM" "$SHA_MAC_X86" "$SHA_LIN_ARM" "$SHA_LIN_X86"; do
            test -n "$sha" || { echo "missing checksum for one of the targets" >&2; exit 1; }
          done

          mkdir -p tap/Formula
          cat > tap/Formula/secretenv.rb <<EOF
          # Generated by the release workflow. Do not edit by hand.
          class Secretenv < Formula
            desc "Run any process with secrets from all your backends"
            homepage "https://secretenv.io"
            version "${VER}"
            license "AGPL-3.0-only"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/secretenv-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              else
                url "${BASE}/secretenv-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/secretenv-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_ARM}"
              else
                url "${BASE}/secretenv-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_X86}"
              end
            end

            def install
              bin.install "secretenv"
              generate_completions_from_executable(bin/"secretenv", "completions")
            end

            test do
              assert_match "secretenv ${VER}", shell_output("#{bin}/secretenv --version")
            end
          end
          EOF

          echo "--- rendered formula ---"
          cat tap/Formula/secretenv.rb

      - name: Commit + push formula
        shell: bash
        working-directory: tap
        run: |
          git config user.name  "secretenv-release-bot"
          git config user.email "release-bot@secretenv.io"
          git add Formula/secretenv.rb
          if git diff --staged --quiet; then
            echo "no formula changes — skipping commit"
            exit 0
          fi
          git commit -m "secretenv ${GITHUB_REF_NAME}"
          git push
