[graph]
all-features = true

[advisories]
version = 2
yanked  = "warn"
ignore  = []

[licenses]
version              = 2
confidence-threshold = 0.93
allow = [
    # First-party (the workspace crates themselves ship under AGPL).
    "AGPL-3.0-only",
    # Third-party permissive/weak-copyleft deps. Kept intentionally
    # curated — copy-left-strong licenses like GPL are NOT listed;
    # any transitive dep that newly introduces them must be reviewed.
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions    = "warn"
wildcards            = "allow"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
