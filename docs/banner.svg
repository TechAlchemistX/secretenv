<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">secretenv</title>
  <desc id="desc">Run any process with secrets from all your backends. Five backend sources — aws-ssm, 1password, vault, gcp, doppler — converge through an at-symbol registry node and exit as a single resolved env var.</desc>

  <style>
    .fg-primary     { fill: #0f0f0f; }
    .fg-secondary   { fill: #6b6b6b; }
    .fg-tertiary    { fill: #8a8a8a; }
    .stroke-node    { stroke: #8a8a8a; }
    .stroke-dash    { stroke: #b0b0b0; }
    .divider        { stroke: #d4d4d1; }
    .bg-fill        { fill: #f5f5f3; }
    .accent         { fill: #14b8a6; }
    .accent-stroke  { stroke: #14b8a6; }
    @media (prefers-color-scheme: dark) {
      .fg-primary   { fill: #f5f5f3; }
      .fg-secondary { fill: #a8a8a8; }
      .fg-tertiary  { fill: #6b6b6b; }
      .stroke-node  { stroke: #6b6b6b; }
      .stroke-dash  { stroke: #4a4a4a; }
      .divider      { stroke: #2a2a2a; }
      .bg-fill      { fill: #0d0d0d; }
      .accent       { fill: #2dd4bf; }
      .accent-stroke{ stroke: #2dd4bf; }
    }
  </style>

  <rect width="1600" height="600" class="bg-fill"/>

  <text x="90" y="310" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="132" font-weight="700" letter-spacing="-1"><tspan class="fg-primary">secret</tspan><tspan class="accent">env</tspan></text>

  <text x="90" y="380" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="28" font-weight="400" class="fg-secondary">Run any process with secrets</text>
  <text x="90" y="418" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="28" font-weight="400" class="fg-secondary">from all your backends.</text>

  <line x1="910" y1="170" x2="910" y2="440" stroke-width="1" class="divider"/>

  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="26" font-weight="400" text-anchor="end" class="fg-tertiary">
    <text x="1165" y="170">aws-ssm</text>
    <text x="1165" y="240">1password</text>
    <text x="1165" y="310">vault</text>
    <text x="1165" y="380">gcp</text>
    <text x="1165" y="450">doppler</text>
  </g>

  <g fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 7" class="stroke-dash">
    <path d="M 1180 162 L 1230 162 L 1323 280"/>
    <path d="M 1180 232 L 1230 232 L 1316 287"/>
    <path d="M 1180 302 L 1312 302"/>
    <path d="M 1180 372 L 1230 372 L 1316 317"/>
    <path d="M 1180 442 L 1230 442 L 1323 324"/>
  </g>

  <circle cx="1340" cy="302" r="28" fill="none" stroke-width="2" class="stroke-node"/>
  <text x="1340" y="302" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="30" font-weight="500" class="fg-secondary">@</text>

  <g fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="accent-stroke">
    <line x1="1370" y1="302" x2="1448" y2="302"/>
    <path d="M 1436 290 L 1453 302 L 1436 314"/>
  </g>

  <text x="1468" y="302" dominant-baseline="central" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="32" font-weight="700" class="accent">env</text>
</svg>
