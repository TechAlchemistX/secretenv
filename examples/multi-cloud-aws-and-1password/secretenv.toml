[secrets]
# infra (resolves via aws-ssm-prod through the registry)
DATABASE_URL = { from = "secretenv://database-url" }
REDIS_URL    = { from = "secretenv://redis-url" }

# third-party APIs (resolves via 1password-work through the registry)
STRIPE_KEY         = { from = "secretenv://stripe-key" }
DATADOG_API_KEY    = { from = "secretenv://datadog-api-key" }
FIGMA_PLUGIN_TOKEN = { from = "secretenv://figma-plugin-token" }

LOG_LEVEL = { default = "info" }
APP_ENV   = { default = "production" }
