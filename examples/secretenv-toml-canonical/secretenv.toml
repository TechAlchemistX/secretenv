# ============================================================
#  secretenv.toml — canonical annotated reference
# ============================================================
#
#  This file is committed to every repo that uses SecretEnv. It
#  declares WHAT the project needs, using alias names resolved at
#  runtime via the active registry. It contains NO infrastructure
#  paths, NO backend URIs, and NO secret values — ever.
#
#  Two value shapes are accepted inside [secrets], and only two:
#
#    NAME = { from = "secretenv://<alias>" }
#      Look up <alias> in the active registry; inject the resolved
#      secret value into the child process's environment as NAME.
#
#    NAME = { default = "<literal>" }
#      Inject <literal> directly. No backend is consulted.
#
#  Any other shape is a hard error:
#
#    - Direct backend URIs (aws-ssm-prod:///path, 1password://..., etc)
#      are REJECTED to keep infra paths out of repos.
#    - Empty values, missing keys, or unknown directives also fail.
#
#  Aliases are free-form strings. The community convention is
#  kebab-case (stripe-key, not stripe_key or StripeKey) to match the
#  alias registry document shape. Env-var names follow the OS
#  convention: SCREAMING_SNAKE_CASE.
#
# ============================================================

[secrets]

# ── Aliases resolved via the active registry ──
#
#   The alias after `secretenv://` is the LOOKUP KEY in the registry
#   document. The registry translates this to a fully-qualified
#   backend URI (aws-ssm-prod:///..., 1password://..., etc.) which
#   SecretEnv then fetches.

STRIPE_KEY        = { from = "secretenv://stripe-key" }
DATABASE_URL      = { from = "secretenv://database-url" }
DATADOG_API_KEY   = { from = "secretenv://datadog-api-key" }
SENTRY_DSN        = { from = "secretenv://sentry-dsn" }


# ── Static defaults ──
#
#   Injected verbatim with no backend involvement. Useful for:
#     - App-environment markers (APP_ENV, NODE_ENV, RAILS_ENV)
#     - Log-level toggles
#     - Non-secret config that should travel WITH the manifest rather
#       than belonging in a dotenv file or shell rc.

LOG_LEVEL = { default = "info" }
APP_ENV   = { default = "production" }
NODE_ENV  = { default = "production" }


# ── NOT permitted (any of these is a hard error at load time) ──
#
#   DIRECT_URI      = { from = "aws-ssm-prod:///path" }          # ✗ no direct backend URIs
#   RAW_VALUE       = "literal-string"                           # ✗ must be the { ... } form
#   MISSING         = {}                                         # ✗ must have `from` or `default`
#   BOTH            = { from = "secretenv://x", default = "y" }  # ✗ mutually exclusive
#   UNKNOWN         = { custom = "x" }                           # ✗ unknown directive


# ============================================================
#  How SecretEnv resolves the above at runtime
# ============================================================
#
#   1. Reads this file (secretenv.toml) from CWD or --manifest.
#   2. Determines the active registry in this precedence order:
#        a. --registry <name-or-uri> flag
#        b. SECRETENV_REGISTRY env var
#        c. [registries.default] in ~/.config/secretenv/config.toml
#        d. Hard error (no assumption)
#   3. Fetches the registry document(s) listed in `sources`.
#   4. For each `{ from = "secretenv://<alias>" }` entry:
#        a. Looks up <alias> in the cascade (first match wins).
#        b. Resolves the backend-URI target (e.g.
#           `aws-ssm-prod:///myapp/prod/stripe-key`).
#        c. Calls the appropriate backend's `get` to fetch the value.
#   5. Injects every resolved + default value into the child
#      process's environment.
#   6. Exec's the user-supplied command; env is gone when it exits.


# ============================================================
#  Tips
# ============================================================
#
#   - Alias names don't have to match env-var names. Pick whatever
#     reads well in the registry document and use explicit NAME=value
#     bindings here.
#   - If your team uses multiple environments (dev/staging/prod),
#     keep the alias names IDENTICAL across registries. Let the
#     registry routing pick the right backend. Your secretenv.toml
#     stays environment-agnostic.
#   - Use { default = ... } sparingly. Anything operationally
#     meaningful probably belongs in the registry, not here.
