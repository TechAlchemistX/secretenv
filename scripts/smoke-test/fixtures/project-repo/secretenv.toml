# Project manifest — maps env-var names to aliases in the active registry.
# Every alias is defined in every registry document for this validation run,
# so the same manifest resolves against any --registry selection.

[secrets]
STRIPE_KEY   = { from = "secretenv://stripe_key"   }
DB_URL       = { from = "secretenv://db_url"       }
API_KEY      = { from = "secretenv://api_key"      }
OP_PAT       = { from = "secretenv://op_pat"       }
OAUTH_TOKEN  = { from = "secretenv://oauth_token"  }
GCP_SECRET   = { from = "secretenv://gcp_secret"   }
AZURE_SECRET = { from = "secretenv://azure_secret" }
LOG_LEVEL    = { default = "info"                  }
