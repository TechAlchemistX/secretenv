# Phase 8c — second alias used as the Block C migrate source. Starts
# pointing at `local-otel` and is migrated to `local-otel-dst` during
# the smoke; the seed value distinguishes a successful pointer flip
# from a no-op.
otel_migrate_src = "local-otel://@@RUNTIME_DIR@@/v0.17-otel/local-secrets/migrate-src.txt"
# v0.19 Sec-F-5 — deliberately-failing alias for the
# `--otel-include-error-detail` emission block (Block G). Resolves to a
# valid `local-otel://` URI whose target file is NEVER seeded, so
# `Backend::get` fails AFTER the `secretenv.backend.fetch` span opens —
